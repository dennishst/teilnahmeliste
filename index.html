                        setShowRefreshWarning(true);
                    }
                }
            };

            window.addEventListener('beforeunload', handleBeforeUnload);
            window.addEventListener('keydown', handleKeyDown);
            document.addEventListener('touchstart', handleTouchStart, { passive: true });
            document.addEventListener('touchmove', handleTouchMove, { passive: false });

            if (participants.length > 0) {
                document.documentElement.classList.add('block-pull-refresh');
                document.body.classList.add('block-pull-refresh');
            } else {
                document.documentElement.classList.remove('block-pull-refresh');
                document.body.classList.remove('block-pull-refresh');
            }

            return () => {
                window.removeEventListener('beforeunload', handleBeforeUnload);
                window.removeEventListener('keydown', handleKeyDown);
                document.removeEventListener('touchstart', handleTouchStart);
                document.removeEventListener('touchmove', handleTouchMove);
            };
        }, [participants]);

        // ── Excel-Upload ──────────────────────────────────────────────────────
        const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet, { raw: false, dateNF: 'dd.mm.yyyy' });

                const loaded = jsonData.map((p) => {
                    let datumValue = p.Datum || p.datum || new Date().toLocaleDateString('de-DE');
                    if (datumValue instanceof Date) {
                        datumValue = datumValue.toLocaleDateString('de-DE');
                    } else if (typeof datumValue === 'number') {
                        const date = new Date(new Date(1899, 11, 30).getTime() + datumValue * 86400000);
                        datumValue = date.toLocaleDateString('de-DE');
                    }
                    return {
                        id: uid(),                                          // FIX: crypto.randomUUID
                        vorname:      p.Vorname      || p.vorname      || '',
                        nachname:     p.Nachname     || p.nachname     || '',
                        unternehmen:  p.Unternehmen  || p.unternehmen  || '',
                        email:        p.Email || p['E-Mail'] || p.email || '',
                        telefon:      p.Telefon      || p.telefon      || '',
                        veranstaltung: p.Veranstaltung || p.veranstaltung || '',
                        datum:        datumValue,
                        signature:    null
                    };
                });

                setParticipants(loaded);
            };
            reader.readAsArrayBuffer(file);
            // Reset input damit dieselbe Datei erneut geladen werden kann
            e.target.value = '';
        };

        // ── Teilnehmer hinzufügen ─────────────────────────────────────────────
        const handleAddParticipant = () => {
            if (!newParticipant.vorname.trim() || !newParticipant.nachname.trim()) {
                alert('Bitte mindestens Vor- und Nachname eingeben!');
                return;
            }
            setParticipants(prev => [...prev, { id: uid(), ...newParticipant, signature: null }]);
            setNewParticipant(emptyForm());
            setShowAddModal(false);
        };

        // ── Bearbeiten öffnen ────────────────────────────────────────────────
        const openEditModal = (participant) => {
            setEditingId(participant.id);
            setEditingParticipant({
                vorname:       participant.vorname,
                nachname:      participant.nachname,
                unternehmen:   participant.unternehmen,
                email:         participant.email,
                telefon:       participant.telefon,
                veranstaltung: participant.veranstaltung,
                datum:         participant.datum
            });
            setShowEditModal(true);
        };

        // ── Bearbeiten speichern ─────────────────────────────────────────────
        const handleSaveEdit = () => {
            if (!editingParticipant.vorname.trim() || !editingParticipant.nachname.trim()) {
                alert('Bitte mindestens Vor- und Nachname eingeben!');
                return;
            }
            setParticipants(prev =>
                prev.map(p => p.id === editingId ? { ...p, ...editingParticipant } : p)  // FIX: ID-basiert
            );
            setShowEditModal(false);
            setEditingId(null);
        };

        // ── Suchfilter ───────────────────────────────────────────────────────
        const filteredParticipants = participants.filter(p =>
            `${p.vorname} ${p.nachname}`.toLowerCase().includes(searchTerm.toLowerCase())
        );

        // ── Canvas: Koordinaten korrekt skalieren ────────────────────────────
        const getCanvasCoords = (e, canvas) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width  / rect.width;   // FIX: Skalierung
            const scaleY = canvas.height / rect.height;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top)  * scaleY
            };
        };

        const startDrawing = (e) => {
            e.preventDefault();
            const canvas = canvasRef.current;
            const { x, y } = getCanvasCoords(e, canvas);
            const ctx = canvas.getContext('2d');
            ctx.beginPath();
            ctx.moveTo(x, y);
            setIsDrawing(true);
        };

        const draw = (e) => {
            if (!isDrawing) return;
            e.preventDefault();
            const canvas = canvasRef.current;
            const { x, y } = getCanvasCoords(e, canvas);
            const ctx = canvas.getContext('2d');
            ctx.lineWidth   = 2.5;
            ctx.lineCap     = 'round';
            ctx.lineJoin    = 'round';
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineTo(x, y);
            ctx.stroke();
        };

        const stopDrawing = () => setIsDrawing(false);

        const clearSignature = () => {
            const canvas = canvasRef.current;
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
        };

        // ── Unterschrift speichern ───────────────────────────────────────────
        const saveSignature = () => {
            const signatureData = canvasRef.current.toDataURL();
            setParticipants(prev =>
                prev.map(p => p.id === selectedId ? { ...p, signature: signatureData } : p)  // FIX: ID-basiert
            );
            setSelectedId(null);
        };

        // ── Unterschrift-Modal öffnen ────────────────────────────────────────
        const openSignatureModal = (participant) => {
            setSelectedId(participant.id);
            setTimeout(() => {
                if (!canvasRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (participant.signature) {
                    const img = new Image();
                    img.onload = () => ctx.drawImage(img, 0, 0);
                    img.src = participant.signature;
                }
            }, 100);
        };

        // ── Excel-Export ─────────────────────────────────────────────────────
        const downloadAttendanceExcel = () => {
            const dataToExport = participants.map(p => ({
                'Vorname':      p.vorname,
                'Nachname':     p.nachname,
                'Unternehmen':  p.unternehmen,
                'E-Mail':       p.email,
                'Telefon':      p.telefon,
                'Veranstaltung': p.veranstaltung,
                'Datum':        p.datum,
                'Anwesend':     p.signature ? 'Ja' : 'Nein'
            }));
            const ws = XLSX.utils.json_to_sheet(dataToExport);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Anwesenheit');
            XLSX.writeFile(wb, `Anwesenheit_${new Date().toISOString().split('T')[0]}.xlsx`);  // FIX: Tippfehler
        };

        // ── PDF-Export ───────────────────────────────────────────────────────
        // Banner-Originalgröße: 1293 x 260 px → Verhältnis ~4.97:1
        const BANNER_RATIO   = 1293 / 260;
        const BANNER_W_MM    = 150;                          // gewünschte Breite in mm
        const BANNER_H_MM    = BANNER_W_MM / BANNER_RATIO;  // proportionale Höhe (~30mm)
        const FOOTER_H       = Math.ceil(BANNER_H_MM) + 6;  // Footer-Gesamthöhe inkl. Abstand
        const FOOTER_MARGIN  = 4;
        const contentBottom  = (ph) => ph - FOOTER_H - FOOTER_MARGIN - 5;

        const addFooterBanner = (doc) => {
            const pw = doc.internal.pageSize.getWidth();
            const ph = doc.internal.pageSize.getHeight();
            // Trennlinie
            doc.setDrawColor(200, 200, 200);
            doc.setLineWidth(0.3);
            doc.line(15, ph - FOOTER_H + 1, pw - 15, ph - FOOTER_H + 1);
            // Banner zentriert, proportional
            const xOffset = (pw - BANNER_W_MM) / 2;
            const yOffset = ph - BANNER_H_MM - 3;
            try {
                doc.addImage(BANNER_B64, 'PNG', xOffset, yOffset, BANNER_W_MM, BANNER_H_MM);
            } catch (err) {
                console.error('Banner-Fehler:', err);
            }
        };

        const downloadSignaturesPDF = () => {
            const signedParticipants = participants.filter(p => p.signature);
            if (signedParticipants.length === 0) {
                alert('Keine unterschriebenen Teilnehmer vorhanden!');
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const pageWidth  = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();
            let y = 20;

            doc.setFontSize(20);
            doc.setTextColor(25, 57, 104);
            doc.text('Unterschriften', pageWidth / 2, y, { align: 'center' });

            y += 15;
            doc.setFontSize(10);
            doc.setTextColor(100, 100, 100);
            doc.text(`Erstellt am: ${new Date().toLocaleDateString('de-DE')}`, pageWidth / 2, y, { align: 'center' });
            y += 15;

            signedParticipants.forEach((p) => {
                if (y > contentBottom(pageHeight)) {
                    addFooterBanner(doc);
                    doc.addPage();
                    y = 20;
                }

                doc.setDrawColor(25, 57, 104);
                doc.setLineWidth(0.5);
                doc.rect(15, y - 5, pageWidth - 30, 60);

                doc.setFontSize(12);
                doc.setTextColor(0, 0, 0);
                doc.text(`${p.vorname} ${p.nachname}`, 20, y + 5);

                doc.setFontSize(9);
                doc.setTextColor(60, 60, 60);
                if (p.unternehmen)   doc.text(`Unternehmen: ${p.unternehmen}`,     20, y + 12);
                if (p.email)         doc.text(`E-Mail: ${p.email}`,                20, y + 19);
                if (p.telefon)       doc.text(`Telefon: ${p.telefon}`,             20, y + 26);
                if (p.veranstaltung) doc.text(`Veranstaltung: ${p.veranstaltung}`, 20, y + 33);
                if (p.datum)         doc.text(`Datum: ${p.datum}`,                 20, y + 40);

                try {
                    doc.addImage(p.signature, 'PNG', pageWidth - 65, y, 50, 25);
                    doc.setFontSize(8);
                    doc.setTextColor(49, 176, 79);
                    doc.text('✓ Unterschrift', pageWidth - 65, y + 30);
                } catch (err) {
                    console.error('Fehler beim Hinzufügen der Unterschrift:', err);
                }

                y += 70;
            });

            // Footer auf letzter Seite
            addFooterBanner(doc);
            doc.save(`Unterschriften_${new Date().toISOString().split('T')[0]}.pdf`);
        };

        // ── Aktuell ausgewählter Teilnehmer ──────────────────────────────────
        const selectedParticipant = participants.find(p => p.id === selectedId);

        // ── Wiederverwendbares Formular ───────────────────────────────────────
        const ParticipantForm = ({ data, onChange }) => (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {[
                    { key: 'vorname',       label: 'Vorname *',     type: 'text',  ph: 'Max' },
                    { key: 'nachname',      label: 'Nachname *',    type: 'text',  ph: 'Mustermann' },
                    { key: 'unternehmen',   label: 'Unternehmen',   type: 'text',  ph: 'MakerPort Stralsund' },
                    { key: 'email',         label: 'E-Mail',        type: 'email', ph: 'max@makerport.de' },
                    { key: 'telefon',       label: 'Telefon',       type: 'tel',   ph: '+49 170 1234567' },
                    { key: 'veranstaltung', label: 'Veranstaltung', type: 'text',  ph: 'Workshop 3D-Druck' },
                    { key: 'datum',         label: 'Datum',         type: 'text',  ph: '10.02.2026' },
                ].map(({ key, label, type, ph }) => (
                    <div key={key}>
                        <label className="block text-sm font-medium text-gray-700 mb-2">{label}</label>
                        <input
                            type={type}
                            value={data[key]}
                            onChange={(e) => onChange({ ...data, [key]: e.target.value })}
                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder={ph}
                        />
                    </div>
                ))}
            </div>
        );

        // ── Render ────────────────────────────────────────────────────────────
        return (
            <div className="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100">

                {/* ── Header ── */}
                <div className="text-white shadow-lg" style={{ background: 'linear-gradient(to right, #193968, #1a4a7a)' }}>
                    <div className="max-w-7xl mx-auto px-6 py-6">
                        <div className="flex items-center gap-4 mb-4">
                            <div className="w-12 h-12 bg-orange-500 rounded-lg flex items-center justify-center text-2xl">📋</div>
                            <div>
                                <h1 className="text-3xl font-bold">Teilnehmerliste</h1>
                                <p className="text-blue-200 text-sm">Digitale Unterschriftenerfassung</p>
                            </div>
                        </div>

                        {/* ── Aktions-Buttons ── */}
                        <div className="flex flex-wrap gap-3 mb-4">
                            <button
                                onClick={() => fileInputRef.current?.click()}
                                className="flex items-center gap-2 bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3 px-6 rounded-lg shadow-md transition-all active:scale-95"
                            >
                                <span className="text-xl">📂</span> Liste hochladen
                            </button>

                            <button
                                onClick={() => setShowAddModal(true)}
                                className="flex items-center gap-2 hover:opacity-90 text-white font-semibold py-3 px-6 rounded-lg shadow-md transition-all active:scale-95"
                                style={{ backgroundColor: '#00abbe' }}
                            >
                                <span className="text-xl">➕</span> Teilnehmer hinzufügen
                            </button>

                            {participants.length > 0 && (
                                <>
                                    <button
                                        onClick={downloadAttendanceExcel}
                                        className="flex items-center gap-2 hover:opacity-90 text-white font-semibold py-3 px-6 rounded-lg shadow-md transition-all active:scale-95"
                                        style={{ backgroundColor: '#31b04f' }}
                                    >
                                        <span className="text-xl">📊</span> Anwesenheits-Excel
                                    </button>
                                    <button
                                        onClick={downloadSignaturesPDF}
                                        className="flex items-center gap-2 hover:opacity-90 text-gray-800 font-semibold py-3 px-6 rounded-lg shadow-md transition-all active:scale-95"
                                        style={{ backgroundColor: '#fff379' }}
                                    >
                                        <span className="text-xl">✍️</span> Unterschriften-PDF
                                    </button>
                                </>
                            )}
                        </div>

                        {/* ── Suchfeld ── */}
                        {participants.length > 0 && (
                            <div className="mb-4">
                                <input
                                    type="text"
                                    placeholder="🔍 Nach Name suchen..."
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    className="w-full max-w-md px-4 py-3 rounded-lg text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-orange-500"
                                />
                            </div>
                        )}

                        {/* ── Statistiken ── */}
                        {participants.length > 0 && (
                            <div className="flex flex-wrap gap-6 text-sm">
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 bg-orange-400 rounded-full"></div>
                                    <span><strong>{participants.length}</strong> Teilnehmer gesamt</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full" style={{ backgroundColor: '#31b04f' }}></div>
                                    <span><strong>{participants.filter(p => p.signature).length}</strong> unterschrieben</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full" style={{ backgroundColor: '#f97316' }}></div>
                                    <span><strong>{participants.filter(p => !p.signature).length}</strong> ausstehend</span>
                                </div>
                                {searchTerm && (
                                    <div className="flex items-center gap-2">
                                        <div className="w-2 h-2 rounded-full" style={{ backgroundColor: '#00abbe' }}></div>
                                        <span><strong>{filteredParticipants.length}</strong> gefunden</span>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>

                {/* ── Verstecktes Datei-Input ── */}
                <input
                    ref={fileInputRef}
                    type="file"
                    accept=".xlsx,.xls,.csv"
                    onChange={handleFileUpload}
                    className="hidden"
                />

                {/* ── Hauptinhalt ── */}
                <div className="max-w-7xl mx-auto p-6">

                    {/* ── Leerer Zustand ── */}
                    {participants.length === 0 && (
                        <div className="bg-white rounded-xl shadow-lg p-16 text-center border border-gray-200">
                            <div className="w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6" style={{ backgroundColor: '#e3f2fd' }}>
                                <span className="text-5xl">📊</span>
                            </div>
                            <h2 className="text-2xl font-bold text-gray-800 mb-3">Keine Teilnehmerliste geladen</h2>
                            <p className="text-gray-500 text-lg mb-6">Laden Sie eine Excel-Datei hoch oder fügen Sie Teilnehmer manuell hinzu</p>
                            <div className="border rounded-lg p-4 max-w-md mx-auto" style={{ backgroundColor: '#e3f2fd', borderColor: '#90caf9' }}>
                                <p className="text-sm font-medium mb-2" style={{ color: '#193968' }}>Erforderliche Spalten:</p>
                                <p className="text-xs" style={{ color: '#1565c0' }}>
                                    Vorname • Nachname • Unternehmen • E-Mail • Telefon • Veranstaltung • Datum
                                </p>
                            </div>
                        </div>
                    )}

                    {/* ── Keine Suchtreffer ── */}
                    {participants.length > 0 && filteredParticipants.length === 0 && (
                        <div className="bg-white rounded-xl shadow-lg p-16 text-center border border-gray-200">
                            <div className="w-24 h-24 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                <span className="text-5xl">🔍</span>
                            </div>
                            <h2 className="text-2xl font-bold text-gray-800 mb-3">Keine Ergebnisse gefunden</h2>
                            <p className="text-gray-500 text-lg">
                                Keine Teilnehmer für „{searchTerm}" gefunden
                            </p>
                        </div>
                    )}

                    {/* ── Tabelle ── */}
                    {filteredParticipants.length > 0 && (
                        <div className="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
                            <div className="overflow-x-auto">
                                <table className="w-full">
                                    <thead className="text-white" style={{ backgroundColor: '#193968' }}>
                                        <tr>
                                            <th className="px-4 py-4 text-left font-semibold">Vorname</th>
                                            <th className="px-4 py-4 text-left font-semibold">Nachname</th>
                                            <th className="px-4 py-4 text-left font-semibold">Unternehmen</th>
                                            <th className="px-4 py-4 text-left font-semibold">E-Mail</th>
                                            <th className="px-4 py-4 text-left font-semibold">Telefon</th>
                                            <th className="px-4 py-4 text-left font-semibold">Veranstaltung</th>
                                            <th className="px-4 py-4 text-left font-semibold">Datum</th>
                                            <th className="px-4 py-4 text-left font-semibold">Unterschrift</th>
                                            <th className="px-4 py-4 text-left font-semibold">Aktion</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredParticipants.map((participant, index) => (
                                            <tr
                                                key={participant.id}
                                                className={`border-b border-gray-200 hover:bg-blue-50 transition-colors ${index % 2 === 0 ? 'bg-white' : 'bg-slate-50'}`}
                                            >
                                                <td className="px-4 py-4 text-gray-700 font-medium">{participant.vorname}</td>
                                                <td className="px-4 py-4 text-gray-700 font-medium">{participant.nachname}</td>
                                                <td className="px-4 py-4 text-gray-600">{participant.unternehmen}</td>
                                                <td className="px-4 py-4 text-gray-600 text-sm">{participant.email}</td>
                                                <td className="px-4 py-4 text-gray-600">{participant.telefon}</td>
                                                <td className="px-4 py-4 text-gray-600">{participant.veranstaltung}</td>
                                                <td className="px-4 py-4 text-gray-600">{participant.datum}</td>
                                                <td className="px-4 py-4">
                                                    <button
                                                        onClick={() => openSignatureModal(participant)}
                                                        className="w-full py-3 px-4 rounded-lg font-semibold transition-all active:scale-95 text-white hover:opacity-90"
                                                        style={{ backgroundColor: participant.signature ? '#31b04f' : '#f97316' }}
                                                    >
                                                        {participant.signature ? '✓ Unterschrieben' : '✍️ Unterschreiben'}
                                                    </button>
                                                </td>
                                                <td className="px-4 py-4">
                                                    <button
                                                        onClick={() => openEditModal(participant)}
                                                        className="w-full py-3 px-4 rounded-lg font-semibold transition-all active:scale-95 text-white hover:opacity-90"
                                                        style={{ backgroundColor: '#00abbe' }}
                                                    >
                                                        ✏️ Bearbeiten
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* ── Modal: Teilnehmer hinzufügen ── */}
                    {showAddModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col">
                                <div className="text-white p-6 rounded-t-2xl" style={{ background: 'linear-gradient(to right, #193968, #1a4a7a)' }}>
                                    <h2 className="text-2xl font-bold">Neuen Teilnehmer hinzufügen</h2>
                                </div>
                                <div className="p-6 overflow-y-auto flex-1">
                                    <ParticipantForm data={newParticipant} onChange={setNewParticipant} />
                                </div>
                                <div className="p-6 bg-gray-50 flex gap-3 rounded-b-2xl">
                                    <button
                                        onClick={() => setShowAddModal(false)}
                                        className="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-3 px-6 rounded-lg transition-all active:scale-95"
                                    >
                                        Abbrechen
                                    </button>
                                    <button
                                        onClick={handleAddParticipant}
                                        className="flex-1 hover:opacity-90 text-white font-semibold py-3 px-6 rounded-lg transition-all active:scale-95"
                                        style={{ backgroundColor: '#00abbe' }}
                                    >
                                        Hinzufügen
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ── Modal: Teilnehmer bearbeiten ── */}
                    {showEditModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col">
                                <div className="text-white p-6 rounded-t-2xl" style={{ background: 'linear-gradient(to right, #193968, #1a4a7a)' }}>
                                    <h2 className="text-2xl font-bold">Teilnehmer bearbeiten</h2>
                                </div>
                                <div className="p-6 overflow-y-auto flex-1">
                                    <ParticipantForm data={editingParticipant} onChange={setEditingParticipant} />
                                </div>
                                <div className="p-6 bg-gray-50 flex gap-3 rounded-b-2xl">
                                    <button
                                        onClick={() => setShowEditModal(false)}
                                        className="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-3 px-6 rounded-lg transition-all active:scale-95"
                                    >
                                        Abbrechen
                                    </button>
                                    <button
                                        onClick={handleSaveEdit}
                                        className="flex-1 hover:opacity-90 text-white font-semibold py-3 px-6 rounded-lg transition-all active:scale-95"
                                        style={{ backgroundColor: '#31b04f' }}
                                    >
                                        Speichern
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ── Modal: Unterschrift ── */}
                    {selectedId !== null && selectedParticipant && (
                        <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col">
                                <div className="text-white p-6" style={{ background: 'linear-gradient(to right, #193968, #1a4a7a)' }}>
                                    <h2 className="text-2xl font-bold mb-2">Unterschrift erfassen</h2>
                                    <p className="text-blue-200 text-sm">
                                        {selectedParticipant.vorname} {selectedParticipant.nachname}
                                    </p>
                                    <p className="text-white text-base mt-3 font-medium">
                                        Hiermit bestätige ich, an der heutigen Veranstaltung teilgenommen zu haben.
                                    </p>
                                </div>

                                <div className="flex-1 p-6 overflow-auto bg-slate-50">
                                    <div className="rounded-xl bg-white shadow-inner" style={{ border: '4px solid #193968' }}>
                                        <canvas
                                            ref={canvasRef}
                                            width={800}
                                            height={400}
                                            onMouseDown={startDrawing}
                                            onMouseMove={draw}
                                            onMouseUp={stopDrawing}
                                            onMouseLeave={stopDrawing}
                                            onTouchStart={startDrawing}
                                            onTouchMove={draw}
                                            onTouchEnd={stopDrawing}
                                            className="w-full h-auto cursor-crosshair touch-none"
                                            style={{ touchAction: 'none' }}
                                        />
                                    </div>
                                    <p className="text-center text-gray-500 text-sm mt-4">
                                        Bitte unterschreiben Sie mit dem Finger oder Stift im Feld oben
                                    </p>
                                </div>

                                <div className="p-6 bg-white border-t border-gray-200 flex gap-3">
                                    <button
                                        onClick={clearSignature}
                                        className="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-4 px-6 rounded-lg transition-all active:scale-95 flex items-center justify-center gap-2"
                                    >
                                        <span className="text-xl">🗑️</span> Löschen
                                    </button>
                                    <button
                                        onClick={() => setSelectedId(null)}
                                        className="flex-1 hover:opacity-90 text-gray-800 font-semibold py-4 px-6 rounded-lg transition-all active:scale-95 flex items-center justify-center gap-2"
                                        style={{ backgroundColor: '#fff379' }}
                                    >
                                        <span className="text-xl">✕</span> Abbrechen
                                    </button>
                                    <button
                                        onClick={saveSignature}
                                        className="flex-1 hover:opacity-90 text-white font-semibold py-4 px-6 rounded-lg transition-all active:scale-95 flex items-center justify-center gap-2"
                                        style={{ backgroundColor: '#31b04f' }}
                                    >
                                        <span className="text-xl">✓</span> Speichern
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    {/* Refresh-Warnung Modal */}
                    {showRefreshWarning && (
                        <div className="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-6 z-50">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden">
                                <div className="p-6 text-center">
                                    <div className="text-6xl mb-4">⚠️</div>
                                    <h2 className="text-xl font-bold text-gray-900 mb-3">
                                        Seite wirklich neu laden?
                                    </h2>
                                    <p className="text-gray-600 text-sm mb-6">
                                        Alle <strong>{participants.length} Teilnehmer</strong> und deren Unterschriften gehen dabei <strong>unwiderruflich verloren</strong>!
                                    </p>
                                    <div className="flex flex-col gap-3">
                                        <button
                                            onClick={() => setShowRefreshWarning(false)}
                                            className="w-full hover:opacity-90 text-white font-bold py-4 px-6 rounded-xl transition-all active:scale-95 text-lg"
                                            style={{ backgroundColor: '#31b04f' }}
                                        >
                                            ✓ Abbrechen – Daten behalten
                                        </button>
                                        <button
                                            onClick={() => { setShowRefreshWarning(false); window.location.reload(); }}
                                            className="w-full bg-red-500 hover:bg-red-600 text-white font-semibold py-3 px-6 rounded-xl transition-all active:scale-95"
                                        >
                                            🔄 Trotzdem neu laden
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            </div>
        );
    }

    // FIX: React 18 API statt deprecated ReactDOM.render
    const root = ReactDOM.createRoot(document.getElementById('makerport-teilnehmerliste-app'));
    root.render(<AttendanceTracker />);
})();
</script>

<!-- ENDE: Teilnehmerliste App (optimiert) -->
